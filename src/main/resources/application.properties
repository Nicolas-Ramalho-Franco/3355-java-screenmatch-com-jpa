spring.datasource.url=jdbc:postgresql://localhost:5432/alura_series
spring.datasource.username=postgres
# Coloque abaixo a senha REAL do seu banco PostgreSQL
spring.datasource.password=Banespa
spring.datasource.driver-class-name=org.postgresql.Driver

# Dialeto corrigido para PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Isso vai deixar o JPA dar update de forma autom·tica no banco de dados
spring.jpa.hibernate.ddl-auto=update